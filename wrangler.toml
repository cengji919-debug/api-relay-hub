name = "api-relay-hub"
compatibility_date = "2024-02-01"
compatibility_flags = ["nodejs_compat"]

pages_build_output_dir = ".vercel/output/static"

[[d1_databases]]
binding = "DB"
database_name = "api-relay-db"
database_id = ""

[[kv_namespaces]]
binding = "CACHE"
id = ""
preview_id = ""

[vars]
ENVIRONMENT = "production"
JWT_SECRET = ""
JWT_REFRESH_SECRET = ""
STRIPE_SECRET_KEY = ""
STRIPE_WEBHOOK_SECRET = ""
PAYPAL_CLIENT_ID = ""
PAYPAL_CLIENT_SECRET = ""
NEXT_PUBLIC_SITE_URL = "https://api-relay-hub.pages.dev"
NEXT_PUBLIC_CLOUDFLARE = "true"